name: Publish CLI to PyPI

on:
  push:
    tags:
      - "cli-v*"   # release with: git tag cli-v0.1.0 && git push --tags
  release:
    types: [published]   # also fires when a GitHub Release is published

env:
  PYTHON_VERSION: "3.11"

jobs:
  # ── 1. build ─────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3

      - name: Build wheel and sdist
        working-directory: cli
        run: uv build

      - name: Validate distribution metadata
        run: uvx twine check cli/dist/*

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: cli/dist/

  # ── 3. publish → TestPyPI ────────────────────────────────────────────────────
  publish-testpypi:
    name: Publish → TestPyPI
    needs: build
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true   # re-running the same tag won't fail

  # ── 4. publish → PyPI ────────────────────────────────────────────────────────
  publish-pypi:
    name: Publish → PyPI
    needs: [build, publish-testpypi]
    runs-on: ubuntu-latest
    environment: pypi          # configure manual approval gate in GitHub Settings
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - uses: pypa/gh-action-pypi-publish@release/v1
