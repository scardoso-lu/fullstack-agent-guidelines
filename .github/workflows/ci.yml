name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff --no-cache-dir

      - name: Check formatting and linting
        run: ruff check ./src

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: "1.8.3"
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Cache virtualenv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ hashFiles('poetry.lock') }}
          restore-keys: venv-${{ runner.os }}-

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Run tests
        run: poetry run task pytest

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: |
            coverage.xml
            htmlcov/
          retention-days: 7

  test-cli:
    name: Test CLI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with:
          python-version: "3.11"
          enable-cache: true

      - name: Install CLI
        working-directory: cli
        run: uv venv && uv pip install -e .

      - name: Smoke — help renders without error
        run: cli/.venv/bin/validate-tools --help

      - name: Smoke — clean input exits 0
        run: |
          echo "abc1234 feat(auth): add JWT login" | cli/.venv/bin/validate-tools commits

      - name: Smoke — violations exit 2
        run: |
          echo "abc1234 bad commit message" | cli/.venv/bin/validate-tools commits
          [ $? -eq 2 ]

      - name: Smoke — JSON output is valid when piped
        run: |
          echo "abc1234 feat(auth): add login" \
            | cli/.venv/bin/validate-tools commits \
            | python3 -c "import json,sys; d=json.load(sys.stdin); assert d['status']=='clean'"

      - name: Smoke — batch run command
        run: |
          echo '{"commits":"abc1234 feat: ok","supply_chain":"[project]\nname=\"foo\""}' \
            | cli/.venv/bin/validate-tools run \
            | python3 -c "import json,sys; d=json.load(sys.stdin); assert len(d)==2"
